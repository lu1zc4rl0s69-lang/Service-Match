<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- SIDEBAR FRAGMENT -->
<nav th:fragment="sidebar(userType)" class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a th:href="@{/}" class="sidebar-brand">
            <i class="bi bi-wrench-adjustable-circle-fill"></i>
            <span>ServiceMatch</span>
        </a>
        <button class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="bi bi-chevron-left" id="toggleIcon"></i>
        </button>
    </div>

    <div class="sidebar-user">
        <div class="user-avatar"
             th:text="${userType == 'Cliente' and usuario != null ? #strings.substring(usuario.nome,0,1).toUpperCase()
                       : (userType == 'Profissional' and profissional != null ? #strings.substring(profissional.usuario.nome,0,1).toUpperCase()
                       : 'A')}">A</div>
        <div class="user-info">
            <span class="user-name"
                  th:text="${userType == 'Cliente' and usuario != null ? usuario.nome
                            : (userType == 'Profissional' and profissional != null ? profissional.usuario.nome
                            : 'Admin')}">Usuario</span>
            <span class="user-role" th:text="${userType}">Papel</span>
        </div>
    </div>

    <!-- Menu Cliente -->
    <ul class="sidebar-menu" th:if="${userType == 'Cliente'}">
        <li><a th:href="@{/cliente/dashboard}"
               th:class="${currentPage == 'dashboard'} ? 'active' : ''">
            <i class="bi bi-grid-fill"></i><span>Dashboard</span></a></li>
        <li><a th:href="@{/cliente/buscar}"
               th:class="${currentPage == 'buscar'} ? 'active' : ''">
            <i class="bi bi-search"></i><span>Buscar Profissionais</span></a></li>
        <li><a th:href="@{/cliente/chamados}"
               th:class="${currentPage == 'chamados'} ? 'active' : ''">
            <i class="bi bi-clipboard-check"></i><span>Meus Chamados</span></a></li>
        <li><a th:href="@{/cliente/avaliacoes}"
               th:class="${currentPage == 'avaliacoes'} ? 'active' : ''">
            <i class="bi bi-star-fill"></i><span>Avaliações</span></a></li>
        <li><a th:href="@{/cliente/perfil}"
               th:class="${currentPage == 'perfil'} ? 'active' : ''">
            <i class="bi bi-person-fill"></i><span>Meu Perfil</span></a></li>
    </ul>

    <!-- Menu Profissional -->
    <ul class="sidebar-menu" th:if="${userType == 'Profissional'}">
        <li><a th:href="@{/profissional/dashboard}"
               th:class="${currentPage == 'dashboard'} ? 'active' : ''">
            <i class="bi bi-grid-fill"></i><span>Dashboard</span></a></li>
        <li><a th:href="@{/profissional/chamados}"
               th:class="${currentPage == 'chamados'} ? 'active' : ''">
            <i class="bi bi-clipboard-check"></i><span>Chamados</span></a></li>
        <li><a th:href="@{/profissional/avaliacoes}"
               th:class="${currentPage == 'avaliacoes'} ? 'active' : ''">
            <i class="bi bi-star-fill"></i><span>Avaliações</span></a></li>
        <li><a th:href="@{/profissional/tokens}"
               th:class="${currentPage == 'tokens'} ? 'active' : ''">
            <i class="bi bi-coin"></i><span>Tokens</span></a></li>
        <li><a th:href="@{/profissional/perfil}"
               th:class="${currentPage == 'perfil'} ? 'active' : ''">
            <i class="bi bi-person-fill"></i><span>Meu Perfil</span></a></li>
    </ul>

    <!-- Menu Admin -->
    <ul class="sidebar-menu" th:if="${userType == 'Admin'}">
        <li><a th:href="@{/admin/dashboard}"
               th:class="${currentPage == 'dashboard'} ? 'active' : ''">
            <i class="bi bi-grid-fill"></i><span>Dashboard</span></a></li>
        <li><a th:href="@{/admin/clientes}"
               th:class="${currentPage == 'clientes'} ? 'active' : ''">
            <i class="bi bi-people-fill"></i><span>Clientes</span></a></li>
        <li><a th:href="@{/admin/profissionais}"
               th:class="${currentPage == 'profissionais'} ? 'active' : ''">
            <i class="bi bi-person-badge-fill"></i><span>Profissionais</span></a></li>
        <li><a th:href="@{/admin/categorias}"
               th:class="${currentPage == 'categorias'} ? 'active' : ''">
            <i class="bi bi-tag-fill"></i><span>Categorias</span></a></li>
        <li><a th:href="@{/admin/avaliacoes}"
               th:class="${currentPage == 'avaliacoes'} ? 'active' : ''">
            <i class="bi bi-star-fill"></i><span>Avaliações</span></a></li>
    </ul>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="logout-btn">
                <i class="bi bi-box-arrow-left"></i><span>Sair</span>
            </button>
        </form>
    </div>
</nav>

<!-- ALERTS FRAGMENT -->
<div th:fragment="alerts">
    <div th:if="${msg}" class="alert alert-success alert-dismissible">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${msg}"></span>
        <button onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${erro}"></span>
        <button onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
    </div>
</div>

<!-- SCRIPTS FRAGMENT - carrega main.js externo -->
<th:block th:fragment="scripts">
    <script th:src="@{/js/main.js}"></script>
</th:block>

</html>
