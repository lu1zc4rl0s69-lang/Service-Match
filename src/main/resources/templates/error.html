<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Erro | ServiceMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary, #f8f9fa);
            padding: 32px 16px;
        }
        .error-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
            padding: 48px 40px;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }
        .error-icon {
            font-size: 64px;
            margin-bottom: 16px;
            display: block;
        }
        .error-status {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 8px;
        }
        .error-title {
            font-size: 20px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 12px;
        }
        .error-message {
            color: #6b7280;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .status-404 { color: #3b82f6; }
        .status-403 { color: #f59e0b; }
        .status-500 { color: #ef4444; }
    </style>
</head>
<body>
<div class="error-page">
    <div class="error-card">

        <!-- Ícone por status -->
        <span class="error-icon"
              th:classappend="${status == 404} ? 'status-404' : (${status == 403} ? 'status-403' : 'status-500')">
            <i class="bi"
               th:classappend="${status == 404} ? 'bi-search' : (${status == 403} ? 'bi-shield-lock-fill' : 'bi-exclamation-triangle-fill')"></i>
        </span>

        <div class="error-status"
             th:classappend="${status == 404} ? 'status-404' : (${status == 403} ? 'status-403' : 'status-500')"
             th:text="${status ?: 500}">500</div>

        <div class="error-title" th:text="${error ?: 'Erro interno'}">Erro interno</div>

        <p class="error-message" th:text="${message ?: 'Ocorreu um erro inesperado.'}">
            Ocorreu um erro inesperado.
        </p>

        <div class="error-actions">
            <a href="javascript:history.back()" class="btn btn-outline">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
            <a th:href="@{/}" class="btn btn-primary">
                <i class="bi bi-house-fill"></i> Página inicial
            </a>
        </div>
    </div>
</div>
</body>
</html>
