<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | ServiceMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>
<div class="auth-page">
    <div class="auth-card" style="max-width:400px">
        <div class="auth-logo">
            <i class="bi bi-wrench-adjustable-circle-fill"></i>
            <span>ServiceMatch</span>
        </div>
        <p class="text-muted text-sm" style="text-align:center;margin-bottom:24px">Conectando você a profissionais de confiança</p>

        <!-- Alertas -->
        <div th:if="${erro}" class="alert alert-danger alert-dismissible">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${erro}"></span>
            <button onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
        </div>
        <div th:if="${msg}" class="alert alert-success alert-dismissible">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${msg}"></span>
            <button onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
        </div>

        <!-- Seleção de perfil (visual only) -->
        <div class="role-tabs mb-3">
            <button class="role-tab active" onclick="setRole('cliente',this)">
                <i class="bi bi-person-fill"></i> Cliente
            </button>
            <button class="role-tab" onclick="setRole('profissional',this)">
                <i class="bi bi-wrench-adjustable"></i> Profissional
            </button>
            <button class="role-tab" onclick="setRole('admin',this)">
                <i class="bi bi-shield-fill"></i> Admin
            </button>
        </div>

        <p id="roleDesc" class="text-muted text-sm" style="text-align:center;margin-bottom:20px">
            Acesse para buscar e contratar profissionais
        </p>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label class="form-label" for="email">E-mail</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="seu@email.com" required autofocus/>
            </div>

            <div class="form-group">
                <label class="form-label" for="senha">Senha</label>
                <div style="position:relative">
                    <input type="password" id="senha" name="senha" class="form-control"
                           placeholder="••••••••" required style="padding-right:40px"/>
                    <button type="button" onclick="togglePassword()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-400)">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="flex-between mb-3" style="font-size:.85rem">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
                    <input type="checkbox" name="remember-me"/> Lembrar-me
                </label>
                <a href="#" class="text-primary">Esqueci a senha</a>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg">
                <i class="bi bi-box-arrow-in-right"></i> Entrar
            </button>
        </form>

        <p class="text-sm text-muted" style="text-align:center;margin-top:20px">
            Não tem conta? <a th:href="@{/cadastro}" class="text-primary fw-600">Cadastre-se</a>
        </p>

        <!-- Dica de acesso rápido -->
        <div style="margin-top:24px;padding:14px;background:var(--gray-50);border-radius:var(--radius-sm);font-size:.78rem;color:var(--gray-500)">
            <strong style="color:var(--gray-600)">Acesso rápido:</strong><br/>
            Admin: admin@servicematch.com / admin123<br/>
            Cliente: ana@email.com / 123456<br/>
            Profissional: carlos@email.com / 123456
        </div>
    </div>
</div>

<script>
const roleDescs = {
    cliente: 'Acesse para buscar e contratar profissionais',
    profissional: 'Acesse para gerenciar seu perfil e serviços',
    admin: 'Acesse para administrar a plataforma'
};

function setRole(role, btn) {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('roleDesc').textContent = roleDescs[role];
}

function togglePassword() {
    const input = document.getElementById('senha');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
