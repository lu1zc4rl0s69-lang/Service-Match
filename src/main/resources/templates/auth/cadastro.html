<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cadastro | ServiceMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>
<div class="auth-page" style="padding:32px 24px">
    <div class="auth-card" style="max-width:600px">

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
            <a th:href="@{/login}" class="btn btn-outline btn-sm"><i class="bi bi-arrow-left"></i></a>
            <div class="auth-logo" style="margin:0">
                <i class="bi bi-wrench-adjustable-circle-fill"></i>
                <span>ServiceMatch</span>
            </div>
        </div>

        <div th:if="${erro}" class="alert alert-danger alert-dismissible">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${erro}"></span>
            <button onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
        </div>

        <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:4px">Criar Conta</h2>
        <p class="text-muted text-sm mb-3">Preencha todos os dados para se cadastrar</p>

        <!-- Tipo de conta -->
        <div class="role-tabs mb-2">
            <button type="button" class="role-tab active" onclick="setTipo('CLIENTE',this)">
                <i class="bi bi-person-fill"></i> Sou Cliente
            </button>
            <button type="button" class="role-tab" onclick="setTipo('PROFISSIONAL',this)">
                <i class="bi bi-wrench-adjustable"></i> Sou Profissional
            </button>
        </div>
        <p id="tipoDesc" class="text-muted text-sm mb-3" style="text-align:center">
            Você poderá buscar e contratar profissionais
        </p>

        <form th:action="@{/cadastro}" method="post">
            <input type="hidden" name="tipo" id="tipoInput" value="CLIENTE"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <!-- Dados Pessoais -->
            <p class="section-label">Dados Pessoais</p>
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Nome Completo *</label>
                    <input type="text" name="nome" class="form-control" placeholder="Seu nome completo" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">CPF *</label>
                    <input type="text" name="cpf" id="cpfInput" class="form-control" placeholder="000.000.000-00" maxlength="14" required/>
                </div>
            </div>
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Data de Nascimento</label>
                    <input type="date" name="dataNascimento" class="form-control"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Telefone / WhatsApp</label>
                    <input type="tel" name="telefone" id="telefoneInput" class="form-control" placeholder="(83) 99999-9999"/>
                </div>
            </div>

            <!-- Contato -->
            <p class="section-label">Contato</p>
            <div class="form-group">
                <label class="form-label">E-mail *</label>
                <input type="email" name="email" class="form-control" placeholder="seu@email.com" required/>
            </div>

            <!-- Endereço -->
            <p class="section-label">Endereço</p>
            <div class="form-group">
                <label class="form-label">Endereço</label>
                <input type="text" name="endereco" class="form-control" placeholder="Rua, número, complemento"/>
            </div>
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Bairro</label>
                    <input type="text" name="bairro" class="form-control" placeholder="Bairro"/>
                </div>
                <div class="form-group">
                    <label class="form-label">CEP</label>
                    <input type="text" name="cep" id="cepInput" class="form-control" placeholder="00000-000" maxlength="9"/>
                </div>
            </div>
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Cidade</label>
                    <input type="text" name="cidadeUsuario" class="form-control" placeholder="João Pessoa"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Estado (UF)</label>
                    <input type="text" name="estadoUsuario" class="form-control" maxlength="2" placeholder="PB"/>
                </div>
            </div>

            <!-- Campos exclusivos do Profissional -->
            <div id="camposProfissional" style="display:none">
                <p class="section-label">Dados Profissionais</p>
                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label">Categoria *</label>
                        <select name="categoriaId" class="form-control">
                            <option value="">Selecione…</option>
                            <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Preço Base (R$/hora)</label>
                        <input type="number" name="precoBase" class="form-control" placeholder="80" step="0.01" min="0"/>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Descrição dos Serviços</label>
                    <textarea name="descricao" class="form-control" rows="3"
                              placeholder="Descreva seus serviços, experiência e diferenciais…"></textarea>
                </div>
            </div>

            <!-- Acesso -->
            <p class="section-label">Acesso</p>
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Senha *</label>
                    <input type="password" name="senha" id="senha1" class="form-control" placeholder="••••••••" required minlength="6"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmar Senha *</label>
                    <input type="password" name="confirmarSenha" id="senha2" class="form-control" placeholder="••••••••" required minlength="6"/>
                </div>
            </div>

            <div class="form-group" style="display:flex;align-items:flex-start;gap:8px">
                <input type="checkbox" id="terms" required style="margin-top:3px"/>
                <label for="terms" class="text-sm">
                    Concordo com os <a href="#" class="text-primary">Termos de Uso</a> e
                    <a href="#" class="text-primary">Política de Privacidade</a>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg">
                <i class="bi bi-person-plus-fill"></i> Criar Conta
            </button>
        </form>

        <p class="text-sm text-muted" style="text-align:center;margin-top:16px">
            Já tem conta? <a th:href="@{/login}" class="text-primary fw-600">Faça login</a>
        </p>
    </div>
</div>

<script>
const tipoDescs = {
    CLIENTE: 'Você poderá buscar e contratar profissionais',
    PROFISSIONAL: 'Você poderá oferecer seus serviços na plataforma'
};

function setTipo(tipo, btn) {
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tipoInput').value = tipo;
    document.getElementById('tipoDesc').textContent = tipoDescs[tipo];
    document.getElementById('camposProfissional').style.display = tipo === 'PROFISSIONAL' ? 'block' : 'none';
}

document.getElementById('cpfInput').addEventListener('input', function (e) {
    let v = e.target.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    e.target.value = v;
});

document.getElementById('telefoneInput').addEventListener('input', function (e) {
    let v = e.target.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 10) v = v.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
    else if (v.length > 6) v = v.replace(/(\d{2})(\d{4,5})(\d{0,4})/, '($1) $2-$3');
    else if (v.length > 2) v = v.replace(/(\d{2})(\d+)/, '($1) $2');
    e.target.value = v;
});

document.getElementById('cepInput').addEventListener('input', function (e) {
    let v = e.target.value.replace(/\D/g, '').slice(0, 8);
    if (v.length > 5) v = v.replace(/(\d{5})(\d{1,3})/, '$1-$2');
    e.target.value = v;
});

document.getElementById('senha1').addEventListener('input', validarSenhas);
document.getElementById('senha2').addEventListener('input', validarSenhas);

function validarSenhas() {
    const s1 = document.getElementById('senha1').value;
    const s2 = document.getElementById('senha2').value;
    const campo = document.getElementById('senha2');
    campo.setCustomValidity(s1 && s2 && s1 !== s2 ? 'As senhas não coincidem.' : '');
}
</script>
</body>
</html>
