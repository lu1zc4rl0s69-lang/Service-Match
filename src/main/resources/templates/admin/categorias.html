<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Categorias | ServiceMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>
<div class="app-layout">
<div th:replace="~{fragments/layout :: sidebar('Admin')}"></div>
<div class="main-content" id="mainContent">
<div class="topbar">
    <span class="topbar-title">Gerenciar Categorias</span>
    <button class="btn btn-primary btn-sm" onclick="openModal('modalNovaCategoria')">
        <i class="bi bi-plus-lg"></i> Nova Categoria
    </button>
</div>
<div class="page-content">
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="card">
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Ícone</th><th>Nome</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>
                <tr th:each="cat : ${categorias}">
                    <td style="font-size:1.4rem" th:text="${cat.icone}">⚡</td>
                    <td class="fw-600" th:text="${cat.nome}">Nome</td>
                    <td>
                        <span th:if="${cat.ativa}" class="badge badge-green">Ativa</span>
                        <span th:unless="${cat.ativa}" class="badge badge-gray">Inativa</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/categorias/{id}/toggle(id=${cat.id})}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" th:class="${cat.ativa ? 'btn btn-outline btn-sm' : 'btn btn-success btn-sm'}">
                                <span th:text="${cat.ativa ? 'Desativar' : 'Ativar'}"></span>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</div></div></div>

<!-- Modal Nova Categoria -->
<div class="modal-overlay" id="modalNovaCategoria">
    <div class="modal">
        <div class="modal-header flex-between">
            <h3 class="modal-title">Nova Categoria</h3>
            <button onclick="closeModal('modalNovaCategoria')" class="btn btn-outline btn-sm"><i class="bi bi-x"></i></button>
        </div>
        <form th:action="@{/admin/categorias/nova}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label class="form-label">Nome *</label>
                <input type="text" name="nome" class="form-control" required placeholder="Ex: Eletricista"/>
            </div>
            <div class="form-group">
                <label class="form-label">Ícone (emoji)</label>
                <input type="text" name="icone" class="form-control" placeholder="⚡" maxlength="4"/>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeModal('modalNovaCategoria')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
