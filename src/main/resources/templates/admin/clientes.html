<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Clientes | ServiceMatch</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/></head>
<body>
<div class="app-layout">
<div th:replace="~{fragments/layout :: sidebar('Admin')}"></div>
<div class="main-content" id="mainContent">
<div class="topbar"><span class="topbar-title">Gerenciar Clientes</span></div>
<div class="page-content">
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="card">
  <div class="card-header"><span class="card-title">Todos os Clientes (<span th:text="${clientes.size()}">0</span>)</span></div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th>Cadastro</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(clientes)}"><td colspan="6" class="text-muted text-sm" style="text-align:center;padding:24px">Nenhum cliente cadastrado.</td></tr>
        <tr th:each="c : ${clientes}">
          <td class="fw-600" th:text="${c.nome}">Nome</td>
          <td class="text-muted" th:text="${c.email}">email</td>
          <td th:text="${c.telefone ?: '-'}">-</td>
          <td th:text="${#temporals.format(c.dataCadastro,'dd/MM/yyyy')}">-</td>
          <td><span th:if="${c.ativo}" class="badge badge-green">Ativo</span>
              <span th:unless="${c.ativo}" class="badge badge-red">Inativo</span></td>
          <td>
            <form th:action="@{/admin/clientes/{id}/toggle(id=${c.id})}" method="post" style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" th:class="${c.ativo ? 'btn btn-outline btn-sm' : 'btn btn-success btn-sm'}">
                <i th:class="${c.ativo ? 'bi bi-pause-fill' : 'bi bi-play-fill'}"></i>
                <span th:text="${c.ativo ? 'Desativar' : 'Ativar'}"></span>
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</div></div></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body></html>
