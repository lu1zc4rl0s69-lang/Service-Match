<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Clientes | ServiceMatch</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<style>
  /* Stats cards (3 colunas) */
  .stats-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
  @media(max-width:700px){ .stats-3{ grid-template-columns:1fr; } }

  .stat-plain { background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius); padding:24px 28px; }
  .stat-plain-val { font-size:2.2rem; font-weight:800; color:var(--gray-900); line-height:1; }
  .stat-plain-val.green { color:#16a34a; }
  .stat-plain-val.blue  { color:#2563eb; }
  .stat-plain-lbl { font-size:.82rem; color:var(--gray-500); margin-top:6px; }

  /* Avatar colorido por índice */
  .cl-av { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.9rem; flex-shrink:0; }
  .av-0 { background:#dbeafe; color:#2563eb; }
  .av-1 { background:#dcfce7; color:#16a34a; }
  .av-2 { background:#ede9fe; color:#7c3aed; }
  .av-3 { background:#fef3c7; color:#d97706; }
  .av-4 { background:#cffafe; color:#0891b2; }
  .av-5 { background:#fee2e2; color:#dc2626; }

  /* Tabela de clientes */
  .cl-table { width:100%; border-collapse:collapse; }
  .cl-table th { font-size:.75rem; text-transform:uppercase; letter-spacing:.04em; color:var(--gray-500); font-weight:600; padding:10px 16px; border-bottom:1px solid var(--gray-200); text-align:left; }
  .cl-table td { padding:14px 16px; border-bottom:1px solid var(--gray-100); vertical-align:middle; }
  .cl-table tr:last-child td { border-bottom:none; }
  .cl-table tr:hover td { background:var(--gray-50); }

  /* Célula cliente */
  .cl-name { font-weight:600; font-size:.9rem; color:var(--gray-900); }
  .cl-email { font-size:.8rem; color:var(--gray-500); margin-top:1px; }
  .cl-contact { font-size:.82rem; color:var(--gray-600); display:flex; flex-direction:column; gap:3px; }
  .cl-contact a { color:var(--gray-600); text-decoration:none; }
  .cl-contact a:hover { color:var(--primary); }
  .cl-city { font-size:.85rem; color:var(--gray-600); }

  /* Menu de ações */
  .action-wrap { position:relative; }
  .action-btn { background:none; border:none; cursor:pointer; padding:6px 8px; color:var(--gray-500); border-radius:6px; font-size:1.1rem; line-height:1; }
  .action-btn:hover { background:var(--gray-100); color:var(--gray-900); }
  .action-menu { display:none; position:absolute; right:0; top:calc(100% + 4px); background:#fff; border:1px solid var(--gray-200); border-radius:var(--radius); box-shadow:0 4px 16px rgba(0,0,0,.10); min-width:160px; z-index:100; }
  .action-menu.show { display:block; }
  .action-menu-item { display:flex; align-items:center; gap:8px; padding:9px 14px; font-size:.85rem; color:var(--gray-700); cursor:pointer; background:none; border:none; width:100%; text-align:left; }
  .action-menu-item:hover { background:var(--gray-50); color:var(--gray-900); }
  .action-menu-item.danger { color:#dc2626; }
  .action-menu-item.danger:hover { background:#fee2e2; }
  .action-menu form { margin:0; }

  /* Barra de busca */
  .search-wrap { position:relative; flex:1; max-width:340px; }
  .search-wrap i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--gray-400); font-size:.95rem; pointer-events:none; }
  .search-wrap input { padding-left:36px; height:38px; }
</style>
</head>
<body>
<div class="app-layout">
<div th:replace="~{fragments/layout :: sidebar('Admin')}"></div>
<div class="main-content" id="mainContent">

<div class="topbar">
  <span class="topbar-title">Clientes</span>
</div>

<div class="page-content">
<div th:replace="~{fragments/layout :: alerts}"></div>

<!-- Cabeçalho -->
<div class="page-header" style="margin-bottom:16px">
  <div>
    <h1>Clientes</h1>
    <p>Gerencie os clientes cadastrados na plataforma</p>
  </div>
</div>

<!-- Barra de busca + botão novo -->
<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap">
  <form th:action="@{/admin/clientes}" method="get" class="search-wrap">
    <i class="bi bi-search"></i>
    <input type="text" name="termo" class="form-control" placeholder="Buscar por nome, email ou cidade..."
           th:value="${termo}" style="max-width:340px"/>
  </form>
  <button class="btn btn-primary" onclick="openModal('modalNovoCliente')">
    <i class="bi bi-plus-lg"></i> Novo Cliente
  </button>
</div>

<!-- Cards de métricas -->
<div class="stats-3">
  <div class="stat-plain">
    <div class="stat-plain-val" th:text="${totalClientes}">0</div>
    <div class="stat-plain-lbl">Total de Clientes</div>
  </div>
  <div class="stat-plain">
    <div class="stat-plain-val green" th:text="${totalAtivos}">0</div>
    <div class="stat-plain-lbl">Clientes Ativos</div>
  </div>
  <div class="stat-plain">
    <div class="stat-plain-val blue" th:text="${totalServicos}">0</div>
    <div class="stat-plain-lbl">Serviços Contratados</div>
  </div>
</div>

<!-- Lista de Clientes -->
<div class="card card-fill">
  <div class="card-header" style="flex-direction:column;align-items:flex-start;gap:2px">
    <span class="card-title">Lista de Clientes</span>
    <span class="text-muted text-sm" th:text="${clientes.size()} + ' clientes encontrados'"></span>
  </div>
  <div class="table-wrapper" style="overflow-x:auto">
    <table class="cl-table">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Contato</th>
          <th>CPF</th>
          <th>Cidade</th>
          <th>Serviços</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(clientes)}">
          <td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">
            <i class="bi bi-people" style="font-size:2rem;display:block;margin-bottom:8px"></i>
            Nenhum cliente encontrado.
          </td>
        </tr>
        <tr th:each="c,stat : ${clientes}"
            th:attr="data-cid=${c.id}, data-cpf=${c.cpf != null ? c.cpf : ''}, data-nome=${c.nome}">
          <!-- Cliente -->
          <td>
            <div style="display:flex;align-items:center;gap:12px">
              <div class="cl-av" th:classappend="'av-' + ${stat.index % 6}"
                   th:text="${#strings.substring(c.nome,0,2).toUpperCase()}">AB</div>
              <div>
                <div class="cl-name" th:text="${c.nome}">Nome</div>
              </div>
            </div>
          </td>
          <!-- Contato -->
          <td>
            <div class="cl-contact">
              <span><i class="bi bi-envelope" style="font-size:.8rem;margin-right:4px"></i><span th:text="${c.email}">email</span></span>
              <span th:if="${c.telefone != null}"><i class="bi bi-telephone" style="font-size:.8rem;margin-right:4px"></i><span th:text="${c.telefone}">tel</span></span>
            </div>
          </td>
          <!-- CPF -->
          <td>
            <span th:if="${c.cpf != null}" class="text-sm" style="font-family:monospace" th:text="${c.cpf}">-</span>
            <span th:unless="${c.cpf != null}" class="text-muted text-sm">—</span>
          </td>
          <!-- Cidade -->
          <td>
            <span th:if="${c.cidadeUsuario != null}" class="cl-city">
              <i class="bi bi-geo-alt" style="font-size:.8rem;margin-right:2px"></i>
              <span th:text="${c.cidadeUsuario + (c.estadoUsuario != null ? ', ' + c.estadoUsuario : '')}"></span>
            </span>
            <span th:unless="${c.cidadeUsuario != null}" class="text-muted text-sm">—</span>
          </td>
          <!-- Serviços -->
          <td style="font-weight:600;color:var(--gray-700)"
              th:text="${servicosPorCliente.containsKey(c.id) ? servicosPorCliente.get(c.id) : 0}">0</td>
          <!-- Status -->
          <td>
            <span th:if="${c.ativo}" class="badge badge-green">Ativo</span>
            <span th:unless="${c.ativo}" class="badge badge-red">Inativo</span>
          </td>
          <!-- Ações -->
          <td>
            <div class="action-wrap">
              <button class="action-btn" onclick="toggleMenuRow(this)">
                <i class="bi bi-three-dots-vertical"></i>
              </button>
              <div class="action-menu" th:id="'menu-' + ${c.id}">
                <button type="button" class="action-menu-item" onclick="cpfBtnClick(this)">
                  <i class="bi bi-person-vcard"></i> Editar CPF
                </button>
                <form th:action="@{/admin/clientes/{id}/toggle(id=${c.id})}" method="post">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="action-menu-item" th:classappend="${c.ativo ? 'danger' : ''}">
                    <i th:class="${c.ativo ? 'bi bi-pause-circle' : 'bi bi-play-circle'}"></i>
                    <span th:text="${c.ativo ? 'Desativar' : 'Ativar'}"></span>
                  </button>
                </form>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</div>
</div>
</div>

<!-- Modal Novo Cliente -->
<div class="modal-overlay" id="modalNovoCliente">
  <div class="modal">
    <div class="modal-header flex-between">
      <h3 class="modal-title"><i class="bi bi-person-plus-fill"></i> Novo Cliente</h3>
      <button onclick="closeModal('modalNovoCliente')" class="btn btn-outline btn-sm"><i class="bi bi-x"></i></button>
    </div>
    <form th:action="@{/admin/clientes/novo}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Nome Completo *</label>
          <input type="text" name="nome" class="form-control" required placeholder="Nome do cliente"/>
        </div>
        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input type="tel" name="telefone" class="form-control" placeholder="(11) 99999-9999"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">E-mail *</label>
        <input type="email" name="email" class="form-control" required placeholder="cliente@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Senha provisória *</label>
        <input type="password" name="senha" class="form-control" required minlength="6" placeholder="Mínimo 6 caracteres"/>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('modalNovoCliente')">Cancelar</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-person-plus-fill"></i> Criar Cliente</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Editar CPF -->
<div class="modal-overlay" id="modalEditarCpf">
  <div class="modal" style="max-width:400px">
    <div class="modal-header flex-between">
      <h3 class="modal-title"><i class="bi bi-person-vcard"></i> Editar CPF</h3>
      <button onclick="closeModal('modalEditarCpf')" class="btn btn-outline btn-sm"><i class="bi bi-x"></i></button>
    </div>
    <form id="formEditarCpf" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label">Cliente</label>
        <div id="cpfClienteNome" class="fw-600 text-muted"></div>
      </div>
      <div class="form-group">
        <label class="form-label">CPF <span class="text-danger">*</span></label>
        <input type="text" id="cpfInput" name="cpf" class="form-control" placeholder="000.000.000-00"
               maxlength="14" oninput="mascaraCpf(this)" required/>
        <div id="cpfFeedback" style="font-size:.8rem;margin-top:4px;display:none"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('modalEditarCpf')">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="btnSalvarCpf" onclick="return validarCpfForm()">
          <i class="bi bi-save-fill"></i> Salvar CPF
        </button>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
function toggleMenuRow(btn) {
  var tr = btn.closest('tr');
  var menuId = 'menu-' + tr.dataset.cid;
  var menu = document.getElementById(menuId);
  document.querySelectorAll('.action-menu').forEach(function(m) {
    if (m !== menu) m.classList.remove('show');
  });
  if (menu) menu.classList.toggle('show');
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.action-wrap')) {
    document.querySelectorAll('.action-menu').forEach(function(m) { m.classList.remove('show'); });
  }
});

function cpfBtnClick(btn) {
  var tr = btn.closest('tr');
  abrirModalCpf(tr.dataset.cid, tr.dataset.cpf || '', tr.dataset.nome || '');
}

/* CPF */
function mascaraCpf(input) {
  var v = input.value.replace(/\D/g, '').substring(0, 11);
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d)/, '$1.$2');
  v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
  input.value = v;
  mostrarFeedbackCpf(v);
}

function cpfValido(cpf) {
  var nums = cpf.replace(/\D/g, '');
  if (nums.length !== 11 || /^(\d)\1{10}$/.test(nums)) return false;
  var sum = 0, r;
  for (var i = 0; i < 9; i++) sum += parseInt(nums[i]) * (10 - i);
  r = 11 - (sum % 11);
  if (r >= 10) r = 0;
  if (r !== parseInt(nums[9])) return false;
  sum = 0;
  for (var i = 0; i < 10; i++) sum += parseInt(nums[i]) * (11 - i);
  r = 11 - (sum % 11);
  if (r >= 10) r = 0;
  return r === parseInt(nums[10]);
}

function mostrarFeedbackCpf(val) {
  var fb = document.getElementById('cpfFeedback');
  var nums = val.replace(/\D/g, '');
  if (nums.length === 0) { fb.style.display = 'none'; return; }
  fb.style.display = 'block';
  if (nums.length < 11) {
    fb.style.color = 'var(--gray-400)';
    fb.textContent = 'Digite 11 dígitos';
  } else if (cpfValido(val)) {
    fb.style.color = '#16a34a';
    fb.textContent = '✓ CPF válido';
  } else {
    fb.style.color = '#dc2626';
    fb.textContent = '✗ CPF inválido';
  }
}

function abrirModalCpf(id, cpfAtual, nome) {
  document.getElementById('formEditarCpf').action = '/admin/clientes/' + id + '/cpf';
  document.getElementById('cpfClienteNome').textContent = nome;
  document.getElementById('cpfInput').value = cpfAtual;
  mostrarFeedbackCpf(cpfAtual);
  document.querySelectorAll('.action-menu').forEach(function(m) { m.classList.remove('show'); });
  openModal('modalEditarCpf');
}

function validarCpfForm() {
  var val = document.getElementById('cpfInput').value;
  if (!cpfValido(val)) {
    mostrarFeedbackCpf(val);
    document.getElementById('cpfInput').focus();
    return false;
  }
  return true;
}
</script>
</body>
</html>
