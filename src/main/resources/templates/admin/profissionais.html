<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Profissionais | ServiceMatch</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/></head>
<body>
<div class="app-layout">
<div th:replace="~{fragments/layout :: sidebar('Admin')}"></div>
<div class="main-content" id="mainContent">
<div class="topbar"><span class="topbar-title">Gerenciar Profissionais</span></div>
<div class="page-content">
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="card">
  <div class="card-header"><span class="card-title">Todos os Profissionais (<span th:text="${profissionais.size()}">0</span>)</span></div>
  <div class="table-wrapper">
    <table>
      <thead><tr><th>Nome</th><th>Categoria</th><th>Cidade</th><th>Nota</th><th>Tokens</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>
        <tr th:each="p : ${profissionais}">
          <td><div class="fw-600" th:text="${p.usuario.nome}">Nome</div>
              <div class="text-muted text-sm" th:text="${p.usuario.email}">email</div></td>
          <td th:text="${p.categoria?.icone + ' ' + p.categoria?.nome ?: '-'}">-</td>
          <td th:text="${p.cidade != null ? p.cidade + '/' + p.estado : '-'}">-</td>
          <td><i class="bi bi-star-fill" style="color:#f59e0b"></i> <span th:text="${p.avaliacaoMedia}">0</span></td>
          <td th:text="${p.tokens}">0</td>
          <td>
            <span th:if="${p.verificado}" class="badge badge-blue"><i class="bi bi-patch-check-fill"></i> Verificado</span>
            <span th:unless="${p.verificado}" class="badge badge-gray">Pendente</span>
          </td>
          <td>
            <form th:action="@{/admin/profissionais/{id}/verificar(id=${p.id})}" method="post" style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" th:class="${p.verificado ? 'btn btn-outline btn-sm' : 'btn btn-primary btn-sm'}">
                <i th:class="${p.verificado ? 'bi bi-x-circle' : 'bi bi-patch-check-fill'}"></i>
                <span th:text="${p.verificado ? 'Remover' : 'Verificar'}"></span>
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</div></div></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body></html>
