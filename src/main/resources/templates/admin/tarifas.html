<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Tarifas | ServiceMatch</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<style>
  .tipo-badge { display:inline-block; border-radius:6px; padding:3px 10px; font-size:.78rem; font-weight:600; }
  .tipo-perc  { background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe; }
  .tipo-fixo  { background:#f0fdf4; color:#16a34a; border:1px solid #bbf7d0; }
</style>
</head>
<body>
<div class="app-layout">
<div th:replace="~{fragments/layout :: sidebar('Admin')}"></div>
<div class="main-content" id="mainContent">
<div class="topbar">
  <span class="topbar-title">Tarifas</span>
  <button class="btn btn-primary btn-sm" onclick="openModal('modalNovaTarifa')">
    <i class="bi bi-plus-lg"></i> Nova Tarifa
  </button>
</div>
<div class="page-content">
<div th:replace="~{fragments/layout :: alerts}"></div>

<div class="page-header" style="margin-bottom:20px">
  <div>
    <h1>Tarifas</h1>
    <p>Gerencie as tarifas e comissões da plataforma</p>
  </div>
</div>

<div class="card card-fill">
  <div class="card-header">
    <span class="card-title">Todas as Tarifas (<span th:text="${tarifas.size()}">0</span>)</span>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Tipo</th>
          <th>Valor</th>
          <th>Aplicação</th>
          <th>Descrição</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(tarifas)}">
          <td colspan="7" style="text-align:center;padding:40px;color:var(--gray-400)">
            <i class="bi bi-currency-dollar" style="font-size:2rem;display:block;margin-bottom:8px"></i>
            Nenhuma tarifa cadastrada.
          </td>
        </tr>
        <tr th:each="t : ${tarifas}">
          <td class="fw-600" th:text="${t.nome}">Nome</td>
          <td>
            <span th:if="${t.tipo == 'PERCENTUAL'}" class="tipo-badge tipo-perc">
              <i class="bi bi-percent"></i> Percentual
            </span>
            <span th:if="${t.tipo == 'FIXO'}" class="tipo-badge tipo-fixo">
              <i class="bi bi-cash"></i> Fixo
            </span>
          </td>
          <td>
            <span th:if="${t.tipo == 'PERCENTUAL'}" th:text="${t.valor} + '%'">0%</span>
            <span th:if="${t.tipo == 'FIXO'}"        th:text="'R$ ' + ${t.valor}">R$ 0</span>
          </td>
          <td class="text-muted text-sm" th:text="${t.aplicacao ?: '—'}">—</td>
          <td class="text-muted text-sm" th:text="${t.descricao != null ? #strings.abbreviate(t.descricao,60) : '—'}">—</td>
          <td>
            <span th:if="${t.ativa}"   class="badge badge-green">Ativa</span>
            <span th:unless="${t.ativa}" class="badge badge-gray">Inativa</span>
          </td>
          <td style="display:flex;gap:6px">
            <form th:action="@{/admin/tarifas/{id}/toggle(id=${t.id})}" method="post" style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-outline btn-sm"
                      th:title="${t.ativa ? 'Desativar' : 'Ativar'}">
                <i th:class="${t.ativa ? 'bi bi-pause-fill' : 'bi bi-play-fill'}"></i>
              </button>
            </form>
            <form th:action="@{/admin/tarifas/{id}/excluir(id=${t.id})}" method="post" style="display:inline"
                  onsubmit="return confirm('Excluir esta tarifa?')">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:1px solid #fca5a5" title="Excluir">
                <i class="bi bi-trash3"></i>
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

</div>
</div>
</div>

<!-- Modal Nova Tarifa -->
<div class="modal-overlay" id="modalNovaTarifa">
  <div class="modal" style="max-width:480px">
    <div class="modal-header flex-between">
      <h3 class="modal-title"><i class="bi bi-currency-dollar"></i> Nova Tarifa</h3>
      <button onclick="closeModal('modalNovaTarifa')" class="btn btn-outline btn-sm"><i class="bi bi-x"></i></button>
    </div>
    <form th:action="@{/admin/tarifas/nova}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group">
        <label class="form-label">Nome *</label>
        <input type="text" name="nome" class="form-control" required placeholder="Ex: Comissão de Serviço"/>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">Tipo *</label>
          <select name="tipo" class="form-control" required>
            <option value="PERCENTUAL">Percentual (%)</option>
            <option value="FIXO">Valor Fixo (R$)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Valor *</label>
          <input type="number" name="valor" class="form-control" required step="0.01" min="0" placeholder="10"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Aplicação</label>
        <input type="text" name="aplicacao" class="form-control" placeholder="Ex: Por chamado concluído"/>
      </div>
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <textarea name="descricao" class="form-control" rows="3" placeholder="Descreva quando e como esta tarifa é aplicada..."></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('modalNovaTarifa')">Cancelar</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-save-fill"></i> Salvar</button>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
