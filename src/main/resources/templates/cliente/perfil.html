<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Meu Perfil | ServiceMatch</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/></head>
<body>
<div class="app-layout">
<div th:replace="~{fragments/layout :: sidebar('Cliente')}"></div>
<div class="main-content" id="mainContent">
<div class="topbar"><span class="topbar-title">Meu Perfil</span></div>
<div class="page-content" style="max-width:600px">
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="card">
  <div class="card-header"><span class="card-title">Informações Pessoais</span></div>
  <div class="card-body">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
      <div class="prof-avatar" style="width:72px;height:72px;font-size:1.5rem"
           th:text="${#strings.substring(usuario.nome,0,2).toUpperCase()}">AB</div>
      <div>
        <div style="font-size:1.1rem;font-weight:700" th:text="${usuario.nome}">Nome</div>
        <div class="text-muted text-sm" th:text="${usuario.email}">email</div>
        <span class="badge badge-blue mt-1">Cliente</span>
      </div>
    </div>
    <form th:action="@{/cliente/perfil/atualizar}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-group"><label class="form-label">Nome Completo</label>
        <input type="text" name="nome" class="form-control" th:value="${usuario.nome}" required/></div>
      <div class="form-group"><label class="form-label">E-mail</label>
        <input type="email" class="form-control" th:value="${usuario.email}" readonly style="background:var(--gray-50)"/></div>
      <div class="form-group"><label class="form-label">Telefone</label>
        <input type="tel" name="telefone" class="form-control" th:value="${usuario.telefone}"/></div>
      <button type="submit" class="btn btn-primary"><i class="bi bi-save-fill"></i> Salvar Alterações</button>
    </form>
  </div>
</div>
</div></div></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body></html>
