<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Meus Chamados | ServiceMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
</head>
<body>
<div class="app-layout">
<div th:replace="~{fragments/layout :: sidebar('Cliente')}"></div>
<div class="main-content" id="mainContent">
<div class="topbar">
    <span class="topbar-title">Meus Chamados</span>
    <button class="btn btn-primary btn-sm" onclick="openModal('modalNovoChamado')">
        <i class="bi bi-plus-lg"></i> Novo Chamado
    </button>
</div>
<div class="page-content">
<div th:replace="~{fragments/layout :: alerts}"></div>

<div th:if="${#lists.isEmpty(chamados)}" class="card">
    <div class="card-body" style="text-align:center;padding:48px">
        <i class="bi bi-clipboard-x" style="font-size:2.5rem;color:var(--gray-300)"></i>
        <p class="text-muted mt-2">Você ainda não tem chamados.</p>
        <button class="btn btn-primary mt-2" onclick="openModal('modalNovoChamado')">
            <i class="bi bi-plus-lg"></i> Abrir Primeiro Chamado
        </button>
    </div>
</div>

<div style="display:flex;flex-direction:column;gap:12px">
    <div th:each="c : ${chamados}"
         class="chamado-card"
         th:classappend="'prioridade-' + ${c.prioridade.name().toLowerCase()}">
        <div class="flex-between mb-1">
            <div>
                <span class="chamado-title" th:text="${c.titulo}">Título</span>
                <span class="badge badge-gray" style="margin-left:8px;font-size:.7rem" th:text="${c.codigo}">CH-XXX</span>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
                <span th:if="${c.status.name() == 'ABERTO'}" class="badge badge-amber"><i class="bi bi-clock"></i> Aberto</span>
                <span th:if="${c.status.name() == 'EM_ANDAMENTO'}" class="badge badge-blue"><i class="bi bi-hourglass-split"></i> Em andamento</span>
                <span th:if="${c.status.name() == 'CONCLUIDO'}" class="badge badge-green"><i class="bi bi-check-circle-fill"></i> Concluído</span>
                <span th:if="${c.status.name() == 'CANCELADO'}" class="badge badge-red"><i class="bi bi-x-circle-fill"></i> Cancelado</span>
                <span th:if="${c.prioridade.name() == 'ALTA'}" class="badge badge-red">Alta</span>
                <span th:if="${c.prioridade.name() == 'MEDIA'}" class="badge badge-amber">Média</span>
                <span th:if="${c.prioridade.name() == 'BAIXA'}" class="badge badge-green">Baixa</span>
            </div>
        </div>
        <p class="text-sm text-muted mb-1" th:text="${c.descricao}"></p>
        <div class="chamado-meta flex-center gap-3">
            <span th:if="${c.categoria != null}"><span th:text="${c.categoria.icone}"></span> <span th:text="${c.categoria.nome}"></span></span>
            <span th:if="${c.cidade != null}"><i class="bi bi-geo-alt"></i> <span th:text="${c.cidade}"></span></span>
            <span><i class="bi bi-calendar3"></i> <span th:text="${#temporals.format(c.dataAbertura,'dd/MM/yyyy')}"></span></span>
            <span th:if="${c.profissional != null}">
                <i class="bi bi-person-fill"></i> <span th:text="${c.profissional.usuario.nome}"></span>
            </span>
        </div>
    </div>
</div>
</div></div></div>

<!-- Modal Novo Chamado -->
<div class="modal-overlay" id="modalNovoChamado">
    <div class="modal">
        <div class="modal-header flex-between">
            <h3 class="modal-title"><i class="bi bi-clipboard-plus"></i> Novo Chamado</h3>
            <button onclick="closeModal('modalNovoChamado')" class="btn btn-outline btn-sm"><i class="bi bi-x"></i></button>
        </div>
        <form th:action="@{/cliente/chamados/novo}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label class="form-label">Título do Problema *</label>
                <input type="text" name="titulo" class="form-control" required placeholder="Ex: Instalação de tomadas na cozinha"/>
            </div>
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Categoria *</label>
                    <select name="categoriaId" class="form-control" required>
                        <option value="">Selecione...</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.icone + ' ' + cat.nome}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Prioridade</label>
                    <select name="prioridade" class="form-control">
                        <option value="BAIXA">Baixa</option>
                        <option value="MEDIA" selected>Média</option>
                        <option value="ALTA">Alta</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Descrição</label>
                <textarea name="descricao" class="form-control" rows="3" placeholder="Descreva o problema com detalhes..."></textarea>
            </div>
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Endereço</label>
                    <input type="text" name="endereco" class="form-control" placeholder="Rua, número, bairro"/>
                </div>
                <div class="form-group">
                    <label class="form-label">Cidade</label>
                    <input type="text" name="cidade" class="form-control" placeholder="São Paulo"/>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeModal('modalNovoChamado')">Cancelar</button>
                <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill"></i> Abrir Chamado</button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
