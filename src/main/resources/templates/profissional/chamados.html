<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Chamados | ServiceMatch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        .dados-ocultos {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--gray-100);
            border: 1px dashed var(--gray-300);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            color: var(--gray-400);
            font-size: .8rem;
            margin-top: 8px;
        }
        .dados-revelados {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: var(--radius-sm);
            padding: 12px;
            margin-top: 8px;
        }
        [data-theme="dark"] .dados-revelados {
            background: #0d2e1a;
            border-color: #14532d;
        }
        .dados-revelados .dado-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .875rem;
            color: var(--gray-700);
            padding: 4px 0;
        }
        .dados-revelados .dado-item i { color: var(--success); font-size: 1rem; }
        .dados-revelados .dado-label { font-weight: 600; color: var(--gray-600); min-width: 80px; }
        .lock-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--warning-light);
            color: var(--warning);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: .75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="app-layout">
<div th:replace="~{fragments/layout :: sidebar('Profissional')}"></div>
<div class="main-content" id="mainContent">
<div class="topbar">
    <span class="topbar-title">Chamados</span>
    <span class="badge badge-blue"><i class="bi bi-coin"></i> <span th:text="${profissional.tokens}">0</span> tokens</span>
</div>
<div class="page-content">
<div th:replace="~{fragments/layout :: alerts}"></div>

<!-- Filtro -->
<form th:action="@{/profissional/chamados}" method="get" class="filters-bar mb-3">
    <div class="form-group">
        <label class="form-label">Filtrar por Categoria</label>
        <select name="categoriaId" class="form-control" onchange="this.form.submit()">
            <option value="">Todas as categorias</option>
            <option th:each="cat : ${categorias}" th:value="${cat.id}"
                    th:text="${cat.nome}"
                    th:selected="${cat.id == categoriaId}"></option>
        </select>
    </div>
</form>

<div class="grid-2">

    <!-- CHAMADOS DISPONÍVEIS -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">Chamados Disponíveis</span>
            <span class="badge badge-amber" th:text="${chamadosDisponiveis.size()} + ' abertos'"></span>
        </div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px;max-height:600px;overflow-y:auto">
            <div th:if="${#lists.isEmpty(chamadosDisponiveis)}" class="text-muted text-sm">
                Nenhum chamado disponível no momento.
            </div>
            <div th:each="c : ${chamadosDisponiveis}"
                 class="chamado-card"
                 th:classappend="'prioridade-' + ${c.prioridade.name().toLowerCase()}">

                <div class="flex-between mb-1">
                    <span class="chamado-title" th:text="${c.titulo}"></span>
                    <span th:if="${c.prioridade.name()=='ALTA'}"  class="badge badge-red">Alta</span>
                    <span th:if="${c.prioridade.name()=='MEDIA'}" class="badge badge-amber">Média</span>
                    <span th:if="${c.prioridade.name()=='BAIXA'}" class="badge badge-green">Baixa</span>
                </div>

                <!-- Descrição resumida -->
                <p class="text-sm text-muted mb-1"
                   th:text="${c.descricao != null ? #strings.abbreviate(c.descricao, 120) : 'Sem descrição'}"></p>

                <!-- Localização visível -->
                <div class="chamado-meta mb-1">
                    <span th:if="${c.categoria != null}">
                      <i class="bi" th:classappend="${c.categoria.icone}"></i>
                      <span th:text="${c.categoria.nome}"></span>
                    </span>
                    <span th:if="${c.cidade != null}"><i class="bi bi-geo-alt"></i> <span th:text="${c.cidade}"></span></span>
                    <span><i class="bi bi-calendar3"></i> <span th:text="${#temporals.format(c.dataAbertura,'dd/MM/yyyy')}"></span></span>
                </div>

                <!-- Dados ocultos -->
                <div class="dados-ocultos">
                    <i class="bi bi-lock-fill"></i>
                    <span>Telefone e endereço completo visíveis após aceitar</span>
                    <span class="lock-badge"><i class="bi bi-coin"></i> 10 tokens</span>
                </div>

                <!-- Botão aceitar -->
                <div style="display:flex;justify-content:flex-end;margin-top:10px">
                    <form th:action="@{/profissional/chamados/{id}/aceitar(id=${c.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-primary btn-sm"
                                th:disabled="${profissional.tokens < 10}">
                            <i class="bi bi-unlock-fill"></i> Aceitar e Desbloquear
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- MEUS CHAMADOS (dados revelados) -->
    <div class="card">
        <div class="card-header">
            <span class="card-title">Meus Chamados</span>
            <span class="badge badge-blue" th:text="${meusChamados.size()} + ' total'"></span>
        </div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px;max-height:600px;overflow-y:auto">
            <div th:if="${#lists.isEmpty(meusChamados)}" class="text-muted text-sm">
                Você ainda não aceitou nenhum chamado.
            </div>
            <div th:each="c : ${meusChamados}"
                 class="chamado-card"
                 th:classappend="'prioridade-' + ${c.prioridade.name().toLowerCase()}">

                <div class="flex-between mb-1">
                    <span class="chamado-title" th:text="${c.titulo}"></span>
                    <div style="display:flex;gap:6px">
                        <span th:if="${c.status.name()=='EM_ANDAMENTO'}" class="badge badge-blue">Em andamento</span>
                        <span th:if="${c.status.name()=='CONCLUIDO'}"    class="badge badge-green">Concluído</span>
                    </div>
                </div>

                <!-- Descrição COMPLETA -->
                <p class="text-sm text-muted mb-2" th:text="${c.descricao}"></p>

                <!-- Dados REVELADOS -->
                <div class="dados-revelados">
                    <div class="dado-item">
                        <i class="bi bi-person-fill"></i>
                        <span class="dado-label">Cliente:</span>
                        <span th:text="${c.cliente.nome}">Nome</span>
                    </div>
                    <div class="dado-item" th:if="${c.cliente.telefone != null}">
                        <i class="bi bi-telephone-fill"></i>
                        <span class="dado-label">Telefone:</span>
                        <span th:text="${c.cliente.telefone}" style="font-weight:600"></span>
                        <a th:href="'https://wa.me/55' + ${#strings.replace(#strings.replace(#strings.replace(#strings.replace(c.cliente.telefone,' ',''),'(',''),')',''),'-','')}"
                           target="_blank"
                           style="display:inline-flex;align-items:center;gap:4px;background:#25D366;color:#fff;border-radius:20px;padding:3px 10px;font-size:.8rem;font-weight:600;text-decoration:none;margin-left:6px">
                            <i class="bi bi-whatsapp"></i> WhatsApp
                        </a>
                    </div>
                    <div class="dado-item" th:if="${c.endereco != null}">
                        <i class="bi bi-geo-alt-fill"></i>
                        <span class="dado-label">Endereço:</span>
                        <span th:text="${c.endereco}">Endereço</span>
                    </div>
                    <div class="dado-item" th:if="${c.cidade != null}">
                        <i class="bi bi-building"></i>
                        <span class="dado-label">Cidade:</span>
                        <span th:text="${c.cidade}">Cidade</span>
                    </div>
                </div>

                <!-- Botão concluir -->
                <div th:if="${c.status.name()=='EM_ANDAMENTO'}" style="margin-top:10px">
                    <form th:action="@{/profissional/chamados/{id}/concluir(id=${c.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-success btn-sm">
                            <i class="bi bi-check-circle-fill"></i> Marcar como Concluído
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</div></div></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
