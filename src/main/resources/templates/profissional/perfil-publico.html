<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title th:text="${profissional.usuario.nome} + ' | ServiceMatch'">Perfil</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/></head>
<body style="background:var(--gray-100)">
<div style="max-width:800px;margin:0 auto;padding:32px 20px">
  <a href="javascript:history.back()" class="btn btn-outline btn-sm mb-3"><i class="bi bi-arrow-left"></i> Voltar</a>
  <div class="card mb-3">
    <div class="card-body">
      <div style="display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap">
        <div class="prof-avatar" style="width:80px;height:80px;font-size:1.6rem"
             th:text="${#strings.substring(profissional.usuario.nome,0,2).toUpperCase()}">AB</div>
        <div style="flex:1">
          <div style="font-size:1.3rem;font-weight:700" th:text="${profissional.usuario.nome}">Nome</div>
          <div class="text-muted" th:text="${profissional.categoria?.icone + ' ' + profissional.categoria?.nome}"></div>
          <div class="flex-center gap-2 mt-2" style="flex-wrap:wrap">
            <span th:if="${profissional.disponivel}" class="badge badge-green"><i class="bi bi-circle-fill" style="font-size:.5rem"></i> Disponível</span>
            <span th:unless="${profissional.disponivel}" class="badge badge-gray">Ocupado</span>
            <span th:if="${profissional.verificado}" class="badge badge-blue"><i class="bi bi-patch-check-fill"></i> Verificado</span>
            <span class="badge badge-amber"><i class="bi bi-star-fill"></i> <span th:text="${profissional.avaliacaoMedia}"></span></span>
            <span th:if="${profissional.cidade != null}" class="badge badge-gray"><i class="bi bi-geo-alt-fill"></i> <span th:text="${profissional.cidade + ', ' + profissional.estado}"></span></span>
          </div>
          <div style="font-size:1.4rem;font-weight:700;color:var(--primary);margin-top:10px" th:text="'R$ ' + ${profissional.precoBase} + '/hora'"></div>
        </div>
      </div>
      <p class="mt-2" th:text="${profissional.descricao}" style="color:var(--gray-600)"></p>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title"><i class="bi bi-star-fill" style="color:#f59e0b"></i> Avaliações (<span th:text="${profissional.quantidadeAvaliacoes}">0</span>)</span></div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:14px">
      <div th:if="${#lists.isEmpty(avaliacoes)}" class="text-muted text-sm">Nenhuma avaliação ainda.</div>
      <div th:each="av : ${avaliacoes}" style="padding:14px;border:1px solid var(--gray-200);border-radius:var(--radius)">
        <div class="flex-between mb-1">
          <span class="fw-600" th:text="${av.cliente.nome}">Nome</span>
          <span class="text-muted text-sm" th:text="${#temporals.format(av.dataAvaliacao,'dd/MM/yyyy')}"></span>
        </div>
        <div class="star-rating mb-1">
          <i th:each="i : ${#numbers.sequence(1,5)}" class="bi" th:classappend="${i <= av.nota ? 'bi-star-fill filled' : 'bi-star'}"></i>
        </div>
        <p class="text-sm" th:text="${av.comentario}"></p>
      </div>
    </div>
  </div>
</div>
</body></html>
