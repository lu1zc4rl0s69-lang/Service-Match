<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Meu Perfil | ServiceMatch</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/></head>
<body>
<div class="app-layout">
<div th:replace="~{fragments/layout :: sidebar('Profissional')}"></div>
<div class="main-content" id="mainContent">
<div class="topbar"><span class="topbar-title">Meu Perfil</span></div>
<div class="page-content" style="max-width:700px">
<div th:replace="~{fragments/layout :: alerts}"></div>
<div class="card">
  <div class="card-header">
    <span class="card-title">Informações do Perfil</span>
    <a th:href="@{/profissional/publico/{id}(id=${profissional.id})}" class="btn btn-outline btn-sm" target="_blank"><i class="bi bi-eye"></i> Ver Perfil Público</a>
  </div>
  <div class="card-body">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
      <div class="prof-avatar" style="width:72px;height:72px;font-size:1.5rem"
           th:text="${#strings.substring(profissional.usuario.nome,0,2).toUpperCase()}">AB</div>
      <div>
        <div style="font-size:1.1rem;font-weight:700" th:text="${profissional.usuario.nome}">Nome</div>
        <div class="text-muted text-sm" th:text="${profissional.usuario.email}">email</div>
        <div class="flex-center gap-2 mt-1">
          <span class="badge badge-blue" th:text="${profissional.categoria?.icone + ' ' + profissional.categoria?.nome}">Cat</span>
          <span th:if="${profissional.verificado}" class="badge badge-green"><i class="bi bi-patch-check-fill"></i> Verificado</span>
          <span th:if="${profissional.disponivel}" class="badge badge-green">Disponível</span>
          <span th:unless="${profissional.disponivel}" class="badge badge-gray">Ocupado</span>
        </div>
      </div>
    </div>
    <form th:action="@{/profissional/perfil/atualizar}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Nome Completo</label>
          <input type="text" name="nome" class="form-control" th:value="${profissional.usuario.nome}" required/></div>
        <div class="form-group"><label class="form-label">Telefone</label>
          <input type="tel" name="telefone" class="form-control" th:value="${profissional.usuario.telefone}"/></div>
      </div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Categoria</label>
          <select name="categoriaId" class="form-control">
            <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.icone + ' ' + cat.nome}"
                    th:selected="${cat.id == profissional.categoria?.id}"></option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Preço Base (R$/hora)</label>
          <input type="number" name="precoBase" class="form-control" th:value="${profissional.precoBase}" step="0.01"/></div>
      </div>
      <div class="form-grid-2">
        <div class="form-group"><label class="form-label">Cidade</label>
          <input type="text" name="cidade" class="form-control" th:value="${profissional.cidade}"/></div>
        <div class="form-group"><label class="form-label">Estado (UF)</label>
          <input type="text" name="estado" class="form-control" maxlength="2" th:value="${profissional.estado}"/></div>
      </div>
      <div class="form-group"><label class="form-label">Descrição dos Serviços</label>
        <textarea name="descricao" class="form-control" rows="4" th:text="${profissional.descricao}"></textarea></div>
      <div class="form-group" style="display:flex;align-items:center;gap:8px">
        <input type="hidden" name="disponivel" value="false"/>
        <input type="checkbox" name="disponivel" id="disponivel" th:checked="${profissional.disponivel}" value="true"/>
        <label for="disponivel" class="form-label mb-0">Estou disponível para novos chamados</label>
      </div>
      <button type="submit" class="btn btn-primary"><i class="bi bi-save-fill"></i> Salvar Alterações</button>
    </form>
  </div>
</div>
</div></div></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body></html>
