<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Avaliações | ServiceMatch</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/></head>
<body>
<div class="app-layout">
<div th:replace="~{fragments/layout :: sidebar('Profissional')}"></div>
<div class="main-content" id="mainContent">
<div class="topbar"><span class="topbar-title">Minhas Avaliações</span></div>
<div class="page-content">
<div class="stat-cards mb-3">
  <div class="stat-card" title="Média Móvel Exponencial (EMA, α=0,3)">
    <div class="stat-icon amber"><i class="bi bi-star-fill"></i></div>
    <div class="stat-info">
      <div class="stat-value" th:text="${profissional.avaliacaoMedia}">0</div>
      <div class="stat-label">Média Móvel (EMA)</div>
    </div>
  </div>
  <div class="stat-card"><div class="stat-icon blue"><i class="bi bi-chat-square-text-fill"></i></div>
    <div class="stat-info"><div class="stat-value" th:text="${avaliacoes.size()}">0</div><div class="stat-label">Total de Avaliações</div></div></div>
</div>
<div class="card">
  <div class="card-header"><span class="card-title">Todas as Avaliações</span></div>
  <div class="card-body" style="display:flex;flex-direction:column;gap:14px">
    <div th:if="${#lists.isEmpty(avaliacoes)}" class="text-muted text-sm">Você ainda não recebeu avaliações.</div>
    <div th:each="av : ${avaliacoes}" style="padding:16px;border:1px solid var(--gray-200);border-radius:var(--radius)">
      <div class="flex-between mb-2">
        <div class="fw-600" th:text="${av.cliente.nome}">Nome</div>
        <span class="text-muted text-sm" th:text="${#temporals.format(av.dataAvaliacao,'dd/MM/yyyy')}"></span>
      </div>
      <div class="star-rating mb-2">
        <i th:each="i : ${#numbers.sequence(1,5)}" class="bi" th:classappend="${i <= av.nota ? 'bi-star-fill filled' : 'bi-star'}"></i>
        <span class="text-sm text-muted" th:text="'(' + ${av.nota} + '/5)'"></span>
      </div>
      <p class="text-sm" th:text="${av.comentario}" th:if="${av.comentario}"></p>
    </div>
  </div>
</div>
</div></div></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body></html>
